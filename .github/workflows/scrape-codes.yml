name: Scrape Endless Winter Codes

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00（北京时间 08:00）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-codes
  cancel-in-progress: true

jobs:
  scrape-codes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run scrape script
        run: python scripts/scrape_codes.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/codes.json
          git commit -m 'chore(data): refresh TapTap official gift codes' || echo "No changes to commit"
          git push